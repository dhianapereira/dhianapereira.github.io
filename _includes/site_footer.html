<footer class="site-footer">
  <div class="site-shell site-footer__inner">
    <p class="site-footer__copyright">© <span data-current-year>{{ site.time | date: "%Y" }}</span> {% include t.html key="meta.copyright" %}</p>
    <nav class="site-footer__contacts" aria-label="{% include t.html key='footer.contacts_label' %}">
      <a
        class="site-footer__contact-link"
        href="{{ site.data.site.contacts.email.url }}"
        aria-label="{{ site.data.site.contacts.email.label }}"
        title="{{ site.data.site.contacts.email.label }}"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M4 6.5h16a1.5 1.5 0 0 1 1.5 1.5v8A1.5 1.5 0 0 1 20 17.5H4A1.5 1.5 0 0 1 2.5 16V8A1.5 1.5 0 0 1 4 6.5Zm0 1 8 5 8-5"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </a>
      <a
        class="site-footer__contact-link"
        href="{{ site.data.site.contacts.linkedin.url }}"
        aria-label="{{ site.data.site.contacts.linkedin.label }}"
        title="{{ site.data.site.contacts.linkedin.label }}"
        target="_blank"
        rel="noreferrer noopener"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M7 9.5V18M7 6.75a.75.75 0 1 1 0 1.5.75.75 0 0 1 0-1.5ZM11 9.5V18M11 12.25c0-1.52 1.23-2.75 2.75-2.75S16.5 10.73 16.5 12.25V18"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </a>
      <a
        class="site-footer__contact-link"
        href="{{ site.data.site.contacts.github.url }}"
        aria-label="{{ site.data.site.contacts.github.label }}"
        title="{{ site.data.site.contacts.github.label }}"
        target="_blank"
        rel="noreferrer noopener"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M9 18.5c-3 .9-3-1.5-4.2-1.8M18 18.5v-2.3a4 4 0 0 0-1.1-3.1c3.7-.4 7.6-1.8 7.6-8.1A6.3 6.3 0 0 0 23 1.7a5.8 5.8 0 0 0-.1-4.2s-1.4-.4-4.4 1.7a15.1 15.1 0 0 0-8 0C7.5-2.9 6.1-2.5 6.1-2.5A5.8 5.8 0 0 0 6 1.7 6.3 6.3 0 0 0 4.5 6c0 6.2 3.8 7.7 7.5 8.1A4 4 0 0 0 11 17v1.5"
            transform="translate(0 3)"
            fill="none"
            stroke="currentColor"
            stroke-width="1.45"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </a>
    </nav>
  </div>
</footer>
