{% assign app_logo_src = include.logo | default: nil %}
{% assign app_logo_label = include.label | default: "App" %}
<span class="{{ include.class_name }} app-logo{% unless app_logo_src %} app-logo--fallback{% endunless %}">
  {% if app_logo_src %}
  <img src="{{ app_logo_src | relative_url }}" alt="{{ app_logo_label }}" />
  {% else %}
  <svg
    class="app-logo__fallback-icon"
    viewBox="0 0 16 16"
    aria-hidden="true"
    focusable="false"
  >
    <path
      d="M8.31 1.3c.32 1.3-.17 2.09-.8 2.96-.6.82-1.25 1.67-1.25 3.02 0 1.08.52 1.99 1.35 2.52-.06-.28-.1-.57-.1-.88 0-1.09.47-1.96 1-2.76.44-.67.93-1.35 1.18-2.3.93.93 1.76 2.19 1.76 3.89 0 2.28-1.56 4.25-3.89 4.25-2.19 0-3.81-1.69-3.81-3.93 0-1.76.88-3.13 1.95-4.28.91-.97 1.98-1.82 2.61-3.49Z"
      fill="currentColor"
    />
  </svg>
  {% endif %}
</span>
