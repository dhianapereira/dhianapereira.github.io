<a class="project-card reveal-on-scroll" href="{{ project.url | relative_url }}">
  <div class="project-card__index">
    <span>{{ forloop.index | default: "01" }}</span>
  </div>
  <div class="project-card__body">
    <h3>{{ project.title }}</h3>
    <p>{{ project.description }}</p>
  </div>
  <div class="project-card__side">
    <span>{{ project.date | date: "%Y" }}</span>
    <span>{{ project.types | join: " · " }}</span>
  </div>
</a>
