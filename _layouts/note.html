---
layout: default
---

<article class="detail-page detail-page--note site-shell">
  <a
    class="back-link reveal-on-scroll reveal-on-scroll--visible"
    href="{{ '/#notas' | relative_url }}"
  >
    {% include t.html key="notes.back_label" %}
  </a>

  <header class="detail-hero reveal-on-scroll reveal-on-scroll--visible">
    <div class="detail-hero__meta">
      <span>{{ page.date | date: "%d.%m.%Y" }}</span>
      <span>{{ page.read_time }}</span>
    </div>
    <h1>{{ page.title }}</h1>
  </header>

  <section class="detail-content reveal-on-scroll">{{ content }}</section>
</article>
